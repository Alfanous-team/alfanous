name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel setuptools pyparsing whoosh
    
    - name: Extract version from tag
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
          # Fallback: extract version from Makefile if not triggered by tag
          VERSION=$(grep '^VERSION=' Makefile | cut -d'=' -f2)
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0-dev"
          fi
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        echo "Extracted version: ${VERSION}"
    
    - name: Build indexes
      run: |
        make build
    
    - name: Build package (alfanous3)
      run: |
        cd src
        python -m build
    
    - name: Build package (alfanous3-mcp)
      run: |
        cd src/alfanous_mcp
        python -m build
    
    - name: Check distribution
      run: |
        twine check src/dist/* src/alfanous_mcp/dist/*
    
    - name: Publish alfanous3 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.ALFANOUS_PYPI_TOKEN }}
        packages-dir: src/dist/
        skip-existing: true
    
    - name: Publish alfanous3-mcp to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.ALFANOUS_MCP_PYPI_TOKEN }}
        packages-dir: src/alfanous_mcp/dist/
        skip-existing: true
